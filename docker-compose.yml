# Orquestación de ProFeCo
#
# Levanta RabbitMQ y los 7 microservicios Quarkus.
# El frontend Next.js se queda corriendo en el host (npm run dev en :3000)
# y se conecta a:
#   - http://localhost:8080  → api-gateway (mapeado al host)
#   - ws://localhost:8085    → ms-notificaciones (mapeado al host)
#
# Internamente cada microservicio se comunica con los demás usando sus
# nombres de servicio Docker (ms-usuarios, ms-tiendas, etc.) en la red
# 'profeco-net'.
#
# Requisitos:
#   - Docker Desktop corriendo
#   - Antes del primer `docker compose up`, los servicios deben haber sido
#     compilados con `mvn package` (target/quarkus-app/ debe existir).
#     Ya está hecho en este repo.
#
# Comandos útiles:
#   docker compose up -d --build      # construir y arrancar todo
#   docker compose logs -f api-gateway
#   docker compose ps                 # ver estado
#   docker compose down               # detener todo
#   docker compose down -v            # detener y borrar volúmenes (resetea H2)

services:
  # ───────────────────────── Traefik (reverse proxy + load balancer) ─────────────────────────
  # Usa file provider (en lugar del docker provider) para evitar problemas
  # de socket en Docker Desktop Windows. Reenvia a http://api-gateway:8080
  # y Docker DNS hace round-robin entre las replicas activas.
  # Escalar: docker compose up -d --scale api-gateway=N
  traefik:
    image: traefik:v3.0
    container_name: profeco-traefik
    command:
      - "--entrypoints.web.address=:80"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--accesslog.fields.defaultmode=keep"
    ports:
      - "8080:80"     # punto de entrada publico (el frontend pega aqui)
      - "8090:8080"   # dashboard de Traefik → http://localhost:8090
    volumes:
      - ./docker/traefik-dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks: [profeco-net]

  # ───────────────────────── PostgreSQL ─────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: profeco-postgres
    ports:
      - "5433:5432"   # 5433 en el host para no chocar con el Postgres local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/postgres-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [profeco-net]

  # ───────────────────────── RabbitMQ ─────────────────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: profeco-rabbitmq
    ports:
      - "5672:5672"    # broker AMQP
      - "15672:15672"  # consola web → http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks: [profeco-net]

  # ───────────────────────── ms-usuarios :8083 ─────────────────────────
  ms-usuarios:
    build: ./ms-usuarios
    container_name: profeco-ms-usuarios
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_PORT: 8083
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/usuariosdb
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
    networks: [profeco-net]

  # ───────────────────────── ms-tiendas :8082 ─────────────────────────
  ms-tiendas:
    build: ./ms-tiendas
    container_name: profeco-ms-tiendas
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_PORT: 8082
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/tiendasdb
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
    networks: [profeco-net]

  # ───────────────────────── ms-productos :8081 ─────────────────────────
  ms-productos:
    build: ./ms-productos
    container_name: profeco-ms-productos
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_PORT: 8081
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/productosdb
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    networks: [profeco-net]

  # ───────────────────────── ms-reportes :8084 ─────────────────────────
  ms-reportes:
    build: ./ms-reportes
    container_name: profeco-ms-reportes
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_PORT: 8084
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/reportesdb
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: update
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    networks: [profeco-net]

  # ───────────────────────── ms-notificaciones :8085 ─────────────────────────
  ms-notificaciones:
    build: ./ms-notificaciones
    container_name: profeco-ms-notificaciones
    ports:
      - "8085:8085"   # expuesto al host porque el frontend abre WebSocket directo
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      QUARKUS_HTTP_PORT: 8085
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
    networks: [profeco-net]

  # ───────────────────────── ms-busqueda :8086 ─────────────────────────
  ms-busqueda:
    build: ./ms-busqueda
    container_name: profeco-ms-busqueda
    ports:
      - "8086:8086"
    depends_on:
      - ms-productos
      - ms-tiendas
    environment:
      QUARKUS_HTTP_PORT: 8086
      # Override de los REST clients para usar nombres de servicio docker
      QUARKUS_REST_CLIENT_PRODUCTOS_INTERNO_URL: http://ms-productos:8081
      QUARKUS_REST_CLIENT_TIENDAS_INTERNO_URL: http://ms-tiendas:8082
    networks: [profeco-net]

  # ───────────────────────── api-gateway (escalable) ─────────────────────────
  # Sin container_name y sin ports: Traefik se encarga del ingress.
  # Para correr con varias replicas: docker compose up -d --scale api-gateway=3
  api-gateway:
    build: ./api-gateway
    depends_on:
      - ms-productos
      - ms-tiendas
      - ms-usuarios
      - ms-reportes
    environment:
      QUARKUS_HTTP_PORT: 8080
      QUARKUS_REST_CLIENT_PRODUCTOS_API_URL: http://ms-productos:8081
      QUARKUS_REST_CLIENT_TIENDAS_API_URL: http://ms-tiendas:8082
      QUARKUS_REST_CLIENT_USUARIOS_API_URL: http://ms-usuarios:8083
      QUARKUS_REST_CLIENT_REPORTES_API_URL: http://ms-reportes:8084
    networks: [profeco-net]

networks:
  profeco-net:
    driver: bridge

volumes:
  postgres-data:
