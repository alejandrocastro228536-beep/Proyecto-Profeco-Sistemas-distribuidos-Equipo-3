quarkus.http.port=8082

# Base de datos PostgreSQL
# Las env vars QUARKUS_DATASOURCE_* sobreescriben estos valores en Docker.
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/tiendasdb
quarkus.datasource.username=postgres
quarkus.datasource.password=${DB_PASSWORD}

# update: crea tablas faltantes pero conserva los datos existentes
quarkus.hibernate-orm.database.generation=update

# Fixes NetBeans/Windows
quarkus.test.continuous-testing=disabled
quarkus.debug.suspend=false
quarkus.log.category."org.aesh".level=OFF
quarkus.log.category."io.quarkus.dev".level=WARN

quarkus.application.name=ms-tiendas

quarkus.http.cors=true
quarkus.http.cors.origins=*