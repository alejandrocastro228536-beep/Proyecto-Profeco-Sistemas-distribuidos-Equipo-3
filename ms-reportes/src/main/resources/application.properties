quarkus.http.port=8084

# Base de datos H2 en memoria
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/reportesdb;AUTO_SERVER=TRUE
quarkus.datasource.username=sa
quarkus.datasource.password=

# Hibernate crea las tablas al arrancar
quarkus.hibernate-orm.database.generation=drop-and-create

# RabbitMQ
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest

# Canal de salida \u2014 alerta a sanciones cuando hay muchos reportes
mp.messaging.outgoing.inconsistencias-out.connector=smallrye-rabbitmq
mp.messaging.outgoing.inconsistencias-out.exchange.name=inconsistencias
mp.messaging.outgoing.inconsistencias-out.exchange.type=fanout
mp.messaging.outgoing.inconsistencias-out.routing-key=

# Umbral de reportes antes de enviar alerta
profeco.reportes.umbral-alerta=3

# Fixes NetBeans/Windows
quarkus.test.continuous-testing=disabled
quarkus.debug.suspend=false
quarkus.log.category."org.aesh".level=OFF
quarkus.log.category."io.quarkus.dev".level=WARN

quarkus.application.name=ms-reportes

quarkus.http.cors=true
quarkus.http.cors.origins=*