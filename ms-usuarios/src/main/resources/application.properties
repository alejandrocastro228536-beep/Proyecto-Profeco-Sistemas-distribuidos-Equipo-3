quarkus.http.port=8083

# Base de datos H2 en memoria
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:file:./data/usuariosdb;AUTO_SERVER=TRUE
quarkus.datasource.username=sa
quarkus.datasource.password=

quarkus.hibernate-orm.database.generation=drop-and-create

# JWT \u00e2\u0080\u0094 claves RSA incrustadas directamente (no requiere archivos PEM ni openssl)
# Clave publica para VERIFICAR tokens entrantes
mp.jwt.verify.
mp.jwt.verify.issuer=profeco-app

# Clave privada para FIRMAR tokens generados en el login
smallrye.jwt.sign.
smallrye.jwt.new-token.lifespan=3600

# CORS
quarkus.http.cors=true
quarkus.http.cors.origins=*

# Fixes NetBeans/Windows
quarkus.test.continuous-testing=disabled
quarkus.debug.suspend=false
quarkus.log.category."org.aesh".level=OFF
quarkus.log.category."io.quarkus.dev".level=WARN

quarkus.application.name=ms-usuarios
