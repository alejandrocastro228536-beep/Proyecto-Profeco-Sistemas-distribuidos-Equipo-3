apiVersion: apps/v1
kind: Deployment
metadata:
  name: ms-tiendas
  labels:
    io.kompose.service: ms-tiendas
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: ms-tiendas
  template:
    metadata:
      labels:
        io.kompose.service: ms-tiendas
    spec:
      containers:
        - name: ms-tiendas
          image: ms-tiendas
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: QUARKUS_HTTP_PORT
              value: "8082"
            - name: QUARKUS_DATASOURCE_DB_KIND
              value: postgresql
            - name: QUARKUS_DATASOURCE_JDBC_URL
              value: jdbc:postgresql://postgres:5432/tiendasdb
            - name: QUARKUS_DATASOURCE_USERNAME
              value: postgres
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: profeco-db
                  key: password
            - name: QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION
              value: update
