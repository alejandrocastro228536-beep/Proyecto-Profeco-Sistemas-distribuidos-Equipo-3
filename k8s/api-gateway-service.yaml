apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  labels:
    io.kompose.service: api-gateway
spec:
  # LoadBalancer: Docker Desktop trae el controlador cloud-provider-kind
  # que asigna una IP externa accesible desde el host en el puerto declarado.
  # El frontend pega a http://localhost:8080 (como en compose, sin cambios).
  # Tambien balancea entre las replicas internamente (sustituye a Traefik).
  type: LoadBalancer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    io.kompose.service: api-gateway
