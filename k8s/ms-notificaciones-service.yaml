apiVersion: v1
kind: Service
metadata:
  name: ms-notificaciones
  labels:
    io.kompose.service: ms-notificaciones
spec:
  # LoadBalancer: el frontend abre WebSocket a ws://localhost:8085.
  # Docker Desktop expone el puerto al host automaticamente.
  type: LoadBalancer
  ports:
    - name: ws
      port: 8085
      targetPort: 8085
  selector:
    io.kompose.service: ms-notificaciones
